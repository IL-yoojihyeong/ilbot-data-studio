name: Release

# 태그(v*) push 시: 이미지 빌드 → 부팅 스모크 → ghcr push → 오프라인 번들 아티팩트
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/il-yoojihyeong/ilbot-data-studio

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (load locally for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Boot smoke test
        run: |
          docker run -d --name smoke -p 8322:8322 ${IMAGE}:${{ github.ref_name }}
          ok=""
          for i in $(seq 1 30); do
            if curl -fs http://127.0.0.1:8322/api/projects >/dev/null; then ok=1; break; fi
            sleep 1
          done
          docker logs smoke | tail -5
          test -n "$ok"

      - name: Push to ghcr
        run: |
          docker tag ${IMAGE}:${{ github.ref_name }} ${IMAGE}:latest
          docker push ${IMAGE}:${{ github.ref_name }}
          docker push ${IMAGE}:latest
